<div style="max-width: 800px; margin: 0 auto; padding: 20px;">
  <h1 style="text-align: center;">📋 Minhas Tarefas</h1>

  <div style="background: #f5f5f5; padding: 15px; border-radius: 8px;">
    <h3>Nova Tarefa</h3>
    <input type="text" [(ngModel)]="novaTarefa.titulo" placeholder="Título" style="width: 100%; padding: 8px; margin: 5px 0;">
    <input type="text" [(ngModel)]="novaTarefa.descricao" placeholder="Descrição" style="width: 100%; padding: 8px; margin: 5px 0;">
    <select [(ngModel)]="novaTarefa.status" style="width: 100%; padding: 8px; margin: 5px 0;">
      <option value="Pendente">Pendente</option>
      <option value="Concluída">Concluída</option>
    </select>
    <button (click)="adicionarTarefa()" style="background: #4CAF50; color: white; padding: 10px; border: none; border-radius: 5px; width: 100%;">+ Adicionar</button>
  </div>

  <div *ngFor="let tarefa of tarefas" style="border: 1px solid #ddd; padding: 10px; margin: 10px 0; border-radius: 5px;">
    <h3>{{ tarefa.titulo }}</h3>
    <p>{{ tarefa.descricao }}</p>
    <button (click)="excluirTarefa(tarefa.id!)" style="background: #f44336; color: white; border: none; padding: 5px 10px; border-radius: 3px;">Excluir</button>
  </div>

  <div *ngIf="tarefas.length === 0" style="text-align: center; color: gray;">
    Nenhuma tarefa cadastrada
  </div>
</div>
